<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイ・ホームページ</title>
    <style>
        /* ここにデザイン（CSS）を書きます */
        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { color: #333; }
        p { color: #666; }
        .btn {
            display: inline-block;
            background: #007acc;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        .btn:hover { background: #005a9e; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, Mathmatics!</h1>
        <p>VS Codeを使って数学研究会のホームページを作成中です。HTMLやCSSで、我々のサイトを作りました。</p>
        <a href="detail.html" class="btn">詳細はこちら</a>
    </div>

</body>
</html>
