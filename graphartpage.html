<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>文化祭特別ページ</title>
    <script>
        function checkPassword() {
            // パスワードの設定（ここでは 'math2026' とします）
            const password = prompt("合言葉を入力してください：");

            if (password === "math2026") {
                window.location.href='https://sites.google.com/gs.seito-fku.ed.jp/jhs'
            }
            else {
                alert("合言葉が違います。");
                window.location.href = "detail.html"; // トップに戻す
            }
        }
    </script>
</head>
<body onload="checkPassword()">

    <div id="lock-message">
        <h1>遷移中</h1>
        <p>数分経っても遷移しない場合は再度更新してください。</p>
        <a href="index.html">戻る</a>
    </div>

</body>
</html>
